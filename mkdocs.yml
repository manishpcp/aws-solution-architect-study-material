    - 05 Elastic Load Balancing: 05 Elastic Load Balancing.md
    - 06 Container Services: 06 Container Services (ECS, EKS, Fargate).md
    - 07 AWS Lambda & Serverless: 07 AWS Lambda & Serverless.md
    - 08 Amazon S3: 08 Amazon S3.md
    - 09 Amazon EBS & EFS: 09 Amazon EBS & EFS.md
    - 10 Storage Gateway & DataSync: 10 Storage Gateway & DataSync.md
    - 11 Amazon RDS & Aurora: 11 Amazon RDS & Aurora.md
    - 12 DynamoDB: 12 DynamoDB.md
    - 13 ElastiCache & MemoryDB: 13 ElastiCache & MemoryDB.md
    - 14 Amazon CloudFront: 14 Amazon CloudFront.md
    - 15 Route 53: 15 Route 53.md
    - 16 Direct Connect & VPN: 16 Direct Connect & VPN.md
    - 17 Amazon SQS & SNS: 17 Amazon SQS & SNS.md
    - 18 Amazon EventBridge & Step Functions: 18 Amazon EventBridge & Step Functions.md
    - 19 API Gateway: 19 API Gateway.md
