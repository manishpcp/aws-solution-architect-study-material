site_name: AWS Solutions Architect
site_description: Interactive study guide for AWS Solutions Architect certifications
site_author: AWS Architect
site_url: https://manishpcp.github.io/aws-solution-architect-study-material/
repo_name: aws-solution-architect-study-material
repo_url: https://github.com/manishpcp/aws-solution-architect-study-material

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: fontawesome/brands/aws

plugins:
  - search:
      lang: en
      separator: '[\s\-\.,:!\(\)=/]+'

markdown_extensions:
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: false
      title: On this page
  - attr_list

docs_dir: docs
site_dir: site
use_directory_urls: false
extra:
  include_search_terms: []

nav:
  - Home: index.md
  - Chapters:
    - 01 AWS Global Infrastructure: 01 AWS Global Infrastructure.md
    - 02 Identity and Access Management (IAM): 02 Identity and Access Management (IAM).md
    - 03 Virtual Private Cloud (VPC): 03 Virtual Private Cloud (VPC).md
